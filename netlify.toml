# Netlify configuration for Lega World (static site, no build step).
[build]
  publish = "."

# Pretty URL for the editor: /admin -> /admin.html
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
from = "/coach"
to = "/coach.html"
status = 200

[[redirects]]
from = "/player"
to = "/player.html"
status = 200

[[redirects]]
from = "/login"
to = "/login.html"
status = 200

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lega World — Build the beautiful game</title>
  <meta name="description" content="Lega World — a grassroots football ecosystem. Competitions, league tables, teams, players, transfers and 15 seasons of stats." />
  <meta name="theme-color" content="#2C1545" />

  <!-- Montserrat (the brand typeface) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" />

  <link rel="icon" href="assets/logo/lega-world-logo-primary.svg" />
  <link rel="stylesheet" href="css/site.css?v=20260623i" />
</head>
<body>
  <div id="app"></div>

  <!-- runtime + components + app (no build step, no framework).
       ?v= is a cache-buster: bump it whenever a js/css file changes so
       returning visitors fetch the new code instead of a stale cached copy. -->
  <script src="js/dc-runtime.js?v=20260623i"></script>
  <script src="js/components.js?v=20260623i"></script>

  <!-- data: config + bundled defaults + Supabase data layer -->
  <script src="config.js?v=20260623i"></script>
  <script src="js/data.seed.js?v=20260623i"></script>
  <script src="js/challenge-place-data.js?v=20260624b"></script>
  <script src="js/challenge-place-player-data.js?v=20260626a"></script>
  <script src="js/challenge-place-match-data.js?v=20260625a"></script>
  <script src="js/supabase.js?v=20260623i"></script>

  <!-- the application (original template + logic) -->
  <script src="js/app.js?v=20260623i"></script>
  <!-- Phase 1 behaviour: DB-backed registrations/transfers + news reader -->
  <script src="js/integrations.js?v=20260626b"></script>

  <!-- boot: render instantly from bundled data, then upgrade from Supabase -->
  <script>
    (function () {
      function boot() {
        // 1) Render IMMEDIATELY from the bundled data. The site must never wait
        //    on the network to appear — a slow or stalled CDN (esm.sh) / Supabase
        //    used to leave the page blank and frozen until the request resolved
        //    (which never happens on a flaky connection).
        window.LEGA_CONTENT = window.LEGA_CONTENT || null;
        try { window.LEGA_MOUNT(); } catch (e) {}
        // 2) In the background, upgrade to live Supabase data if/when it arrives.
        //    Failures or stalls here no longer matter — the page already works.
        if (!window.LEGA_loadContent) return;
        var pSquads = window.LEGA_loadSquads ? window.LEGA_loadSquads() : Promise.resolve(null);
        Promise.all([
          window.LEGA_loadContent().catch(function () { return null; }),
          pSquads.catch(function () { return null; })
        ]).then(function (res) {
          var content = res[0], squads = res[1];
          if (squads) { content = content || {}; content.rosters = squads; }
          if (!content) return;                      // no live data -> keep instant render
          window.LEGA_CONTENT = content;
          try { window.LEGA_MOUNT(); } catch (e) {}  // re-render with live data (state preserved)
        });
      }
      if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
      else boot();
    })();
  </script>
</body>
</html>
